<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeBridge Admin — Applications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap">
  <style>
    :root {
      --green-dark: #163d35;
      --green-main: #1a5c4a;
      --green-light: #2a8a6e;
      --cream: #f8f7f4;
      --text-dark: #1a1a1a;
      --text-muted: #5a5a5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }

    /* Auth Screen */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--green-dark), var(--green-main));
    }
    .auth-box {
      background: #fff;
      border-radius: 20px;
      padding: 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    }
    .auth-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 8px;
    }
    .auth-subtitle { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 32px; }
    .auth-label { display: block; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dark); margin-bottom: 6px; }
    .auth-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--green-light); }
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--green-light);
      color: #fff;
      border: none;
      border-radius: 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: background 0.2s;
    }
    .auth-btn:hover { background: #23755e; }
    .auth-error { color: #dc2626; font-size: 0.85rem; margin-top: 12px; display: none; }

    /* Admin Dashboard */
    #admin-screen { display: none; }
    .admin-header {
      background: var(--green-dark);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 700; color: #fff; }
    .admin-header-right { display: flex; align-items: center; gap: 16px; }
    .admin-user { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
    .admin-logout {
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      color: rgba(255,255,255,0.8);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      background: none;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
    }
    .admin-logout:hover { background: rgba(255,255,255,0.1); color: #fff; }

    .admin-content { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
    .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid rgba(0,0,0,0.07);
    }
    .stat-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; font-weight: 700; color: var(--green-dark); }

    .admin-section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--text-dark);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .admin-refresh {
      font-size: 0.8rem;
      font-family: 'Outfit', sans-serif;
      padding: 6px 14px;
      border: 1px solid var(--green-light);
      color: var(--green-light);
      border-radius: 20px;
      cursor: pointer;
      background: none;
      font-weight: 600;
      transition: all 0.2s;
    }
    .admin-refresh:hover { background: var(--green-light); color: #fff; }

    .admin-table-wrap {
      background: #fff;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.07);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--green-dark); }
    th {
      padding: 14px 20px;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }
    td { padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(42,138,110,0.04); }
    .td-name { font-weight: 600; color: var(--text-dark); }
    .td-email { color: var(--green-main); }
    .td-date { color: var(--text-muted); font-size: 0.82rem; }
    .td-idea { max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-muted); font-size: 0.85rem; }

    .admin-loading { text-align: center; padding: 60px; color: var(--text-muted); }
    .admin-empty { text-align: center; padding: 60px; color: var(--text-muted); }
    .admin-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    .delete-btn {
      padding: 6px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #dc2626;
      border: 1px solid rgba(220,38,38,0.25);
      border-radius: 8px;
      cursor: pointer;
      background: none;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
    }
    .delete-btn:hover { background: rgba(220,38,38,0.08); }

    @media (max-width: 768px) {
      .admin-stats { grid-template-columns: repeat(2, 1fr); }
      .admin-content { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">CodeBridge</div>
    <p class="auth-subtitle">Admin Panel — Applications Dashboard</p>
    <form id="auth-form">
      <label class="auth-label" for="admin-password">Password</label>
      <input class="auth-input" type="password" id="admin-password" placeholder="Enter admin password" autocomplete="current-password">
      <button type="submit" class="auth-btn">Sign In</button>
      <div class="auth-error" id="auth-error">Incorrect password. Please try again.</div>
    </form>
  </div>
</div>

<!-- Admin Dashboard -->
<div id="admin-screen">
  <header class="admin-header">
    <div class="admin-logo">CodeBridge Admin</div>
    <div class="admin-header-right">
      <span class="admin-user">Applications Dashboard</span>
      <button class="admin-logout" id="admin-logout">Sign Out</button>
    </div>
  </header>

  <main class="admin-content">
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-label">Total Applications</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Week</div>
        <div class="stat-value" id="stat-week">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">This Month</div>
        <div class="stat-value" id="stat-month">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">With Phone</div>
        <div class="stat-value" id="stat-phone">—</div>
      </div>
    </div>

    <div class="admin-section-title">
      Applications
      <button class="admin-refresh" id="refresh-btn">&#8635; Refresh</button>
    </div>

    <div class="admin-table-wrap">
      <div class="admin-loading" id="admin-loading">Loading applications…</div>
      <div class="admin-empty" id="admin-empty" style="display:none;">
        <div class="admin-empty-icon">&#128203;</div>
        <div>No applications yet.</div>
      </div>
      <table id="admin-table" style="display:none;">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Message</th>
            <th>Submitted</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="admin-tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
  import {
    getFirestore,
    collection,
    getDocs,
    deleteDoc,
    doc,
    query,
    orderBy
  } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

  const ADMIN_PASSWORD = 'codebridge2025';
  const COLLECTION_NAME = 'codebridge-applications';

  const firebaseConfig = {
    apiKey: "AIzaSyCZV7nDI1ej4xQgTwoM9shKweXt0-6pqQs",
    authDomain: "ai-forms-25ad9.firebaseapp.com",
    projectId: "ai-forms-25ad9",
    storageBucket: "ai-forms-25ad9.firebasestorage.app",
    messagingSenderId: "710083224092",
    appId: "1:710083224092:web:4c2d2279e5b4dae0ed35d9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Auth
  const authScreen = document.getElementById('auth-screen');
  const adminScreen = document.getElementById('admin-screen');
  const authForm = document.getElementById('auth-form');
  const authError = document.getElementById('auth-error');

  authForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const pw = document.getElementById('admin-password').value;
    if (pw === ADMIN_PASSWORD) {
      authScreen.style.display = 'none';
      adminScreen.style.display = 'block';
      loadApplications();
    } else {
      authError.style.display = 'block';
    }
  });

  document.getElementById('admin-logout').addEventListener('click', () => {
    adminScreen.style.display = 'none';
    authScreen.style.display = 'flex';
    document.getElementById('admin-password').value = '';
  });

  document.getElementById('refresh-btn').addEventListener('click', loadApplications);

  // Load data
  async function loadApplications() {
    const tbody = document.getElementById('admin-tbody');
    const table = document.getElementById('admin-table');
    const loading = document.getElementById('admin-loading');
    const empty = document.getElementById('admin-empty');

    loading.style.display = 'block';
    table.style.display = 'none';
    empty.style.display = 'none';

    try {
      const q = query(collection(db, COLLECTION_NAME), orderBy('submittedAt', 'desc'));
      const snapshot = await getDocs(q);

      loading.style.display = 'none';

      if (snapshot.empty) {
        empty.style.display = 'block';
        updateStats([]);
        return;
      }

      const docs = [];
      snapshot.forEach(d => docs.push({ id: d.id, ...d.data() }));

      updateStats(docs);
      renderTable(docs);
      table.style.display = 'table';
    } catch (err) {
      loading.textContent = 'Error loading applications: ' + err.message;
      console.error(err);
    }
  }

  function updateStats(docs) {
    const now = new Date();
    const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
    const monthAgo = new Date(now.getFullYear(), now.getMonth(), 1);

    document.getElementById('stat-total').textContent = docs.length;
    document.getElementById('stat-week').textContent = docs.filter(d => {
      const t = d.submittedAt?.toDate?.();
      return t && t >= weekAgo;
    }).length;
    document.getElementById('stat-month').textContent = docs.filter(d => {
      const t = d.submittedAt?.toDate?.();
      return t && t >= monthAgo;
    }).length;
    document.getElementById('stat-phone').textContent = docs.filter(d => d.phone).length;
  }

  function renderTable(docs) {
    const tbody = document.getElementById('admin-tbody');
    tbody.innerHTML = docs.map(d => {
      const date = d.submittedAt?.toDate?.()?.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) || '—';
      const idea = (d.idea || '').replace(/</g, '&lt;');
      return `
        <tr>
          <td class="td-name">${esc(d.firstName)} ${esc(d.lastName)}</td>
          <td class="td-email"><a href="mailto:${esc(d.email)}">${esc(d.email)}</a></td>
          <td>${esc(d.phone || '—')}</td>
          <td class="td-idea" title="${idea}">${idea || '—'}</td>
          <td class="td-date">${date}</td>
          <td><button class="delete-btn" data-id="${d.id}">Delete</button></td>
        </tr>
      `;
    }).join('');

    tbody.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this application?')) return;
        await deleteDoc(doc(db, COLLECTION_NAME, btn.dataset.id));
        loadApplications();
      });
    });
  }

  function esc(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
