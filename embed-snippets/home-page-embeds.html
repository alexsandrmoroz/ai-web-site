<!-- CodeBridge Foundation — Home Page Embed Blocks -->
<!-- Each block below is a separate Webflow Embed component on the home page. -->
<!-- Replace REPO with: alexsandrmoroz/codebridge-webflow -->

<!-- ── NAV (global) ─────────────────────────────────────────── -->
<div id="embed-nav"></div>
<script>
  fetch('https://cdn.jsdelivr.net/gh/alexsandrmoroz/codebridge-webflow@main/global/nav.html')
    .then(r => r.text())
    .then(html => { document.getElementById('embed-nav').outerHTML = html; });
</script>
