<!-- Velvet Tour — ABOUT-US BODY (вставити в Webflow: Про нас page → Embed компонент у body) -->

<div id="vt-about"></div>
<script>
fetch('https://alexsandrmoroz.github.io/ai-web-site/pages/about-us/index.html')
  .then(function(r){ return r.text(); })
  .then(function(html){
    document.getElementById('vt-about').outerHTML = html;
    var io = new IntersectionObserver(function(e){
      e.forEach(function(x){ if(x.isIntersecting){ x.target.classList.add('visible'); io.unobserve(x.target); } });
    }, {threshold: 0.1, rootMargin: '0px 0px -40px 0px'});
    document.querySelectorAll('.fade-up').forEach(function(el){ io.observe(el); });
    var co = new IntersectionObserver(function(e){
      e.forEach(function(x){
        if(x.isIntersecting){
          var el=x.target, t=+el.dataset.count, t0=performance.now();
          (function tick(now){ var p=Math.min((now-t0)/1600,1); el.textContent=Math.floor((1-Math.pow(1-p,3))*t).toLocaleString(); if(p<1)requestAnimationFrame(tick); })(t0);
          co.unobserve(el);
        }
      });
    }, {threshold: 0.5});
    document.querySelectorAll('[data-count]').forEach(function(el){ co.observe(el); });
  });
</script>
