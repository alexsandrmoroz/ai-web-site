name: Sync Custom Code to Webflow

on:
  push:
    branches:
      - main
    paths:
      - 'embed-snippets/webflow-head.html'
      - 'embed-snippets/webflow-footer-script.html'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read embed files
        id: read
        run: |
          HEAD_CODE=$(cat embed-snippets/webflow-head.html)
          FOOTER_CODE=$(cat embed-snippets/webflow-footer-script.html)
          echo "head_code<<EOF_HEAD" >> $GITHUB_OUTPUT
          echo "$HEAD_CODE" >> $GITHUB_OUTPUT
          echo "EOF_HEAD" >> $GITHUB_OUTPUT
          echo "footer_code<<EOF_FOOTER" >> $GITHUB_OUTPUT
          echo "$FOOTER_CODE" >> $GITHUB_OUTPUT
          echo "EOF_FOOTER" >> $GITHUB_OUTPUT

      - name: Update Webflow Site Custom Code
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_SITE_ID: 659feba459c4ac5ccfc3a195
        run: |
          HEAD=$(cat embed-snippets/webflow-head.html)
          FOOTER=$(cat embed-snippets/webflow-footer-script.html)

          PAYLOAD=$(jq -n \
            --arg head "$HEAD" \
            --arg footer "$FOOTER" \
            '{"headCode": $head, "footerCode": $footer}')

          HTTP_STATUS=$(curl -s -o /tmp/wf_response.json -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer $WEBFLOW_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.webflow.com/v2/sites/$WEBFLOW_SITE_ID/custom-code")

          echo "Webflow API response (HTTP $HTTP_STATUS):"
          cat /tmp/wf_response.json | jq . || cat /tmp/wf_response.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "❌ Webflow API call failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Webflow custom code updated successfully"

      - name: Publish Webflow Site
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEBFLOW_SITE_ID: 659feba459c4ac5ccfc3a195
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/wf_publish.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $WEBFLOW_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"domains": []}' \
            "https://api.webflow.com/v2/sites/$WEBFLOW_SITE_ID/publish")

          echo "Publish response (HTTP $HTTP_STATUS):"
          cat /tmp/wf_publish.json | jq . || cat /tmp/wf_publish.json

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "⚠️  Publish failed (HTTP $HTTP_STATUS) — custom code was still updated"
          else
            echo "✅ Site published successfully"
          fi
